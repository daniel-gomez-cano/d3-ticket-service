# ========================
# SERVIDOR
# ========================
server.port=8085

# ========================
# BASE DE DATOS (H2 para desarrollo local)
# En Docker se sobreescribe con variables de entorno
# ========================
spring.datasource.url=${DB_URL:jdbc:h2:mem:ticketdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ========================
# H2 CONSOLE (solo desarrollo)
# ========================
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ========================
# KEYCLOAK (mismo realm que auth-service)
# ========================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/viva-eventos}

# ========================
# URL DEL EVENT-SERVICE (para validar eventos)
# ========================
event.service.url=${EVENT_SERVICE_URL:http://event-service:8082}