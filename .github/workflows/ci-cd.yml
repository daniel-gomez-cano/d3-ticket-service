name: CI/CD — ticket-service

on:
  # CI: corre en todo push y PR a cualquier rama
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1: CI — Compilar y testear en todo push/PR
  # ─────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compilar y ejecutar tests
        run: mvn clean verify --no-transfer-progress
        working-directory: ticket-service

      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ticket-service/target/surefire-reports/

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: CD — Build y push de imagen Docker a DockerHub
  #         Solo se ejecuta cuando hay merge a main
  # ─────────────────────────────────────────────────────────────────
  docker-publish:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test

    # CONDICIÓN CLAVE: solo corre en push a main (merge)
    # No corre en PRs ni en otras ramas
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Construir JAR
        run: mvn clean package -DskipTests --no-transfer-progress
        working-directory: ticket-service

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraer metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-service
          tags: |
            # Tag con el SHA del commit (ej: sha-abc1234)
            type=sha,prefix=sha-
            # Tag 'latest' siempre en main
            type=raw,value=latest

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./ticket-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache para acelerar builds posteriores
          cache-from: type=gha
          cache-to: type=gha,mode=max
